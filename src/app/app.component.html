<!-- Navbar principale -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <!-- Logo à gauche -->
    <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/">
      <span class="logo-icon">🛍️</span>
      <span class="logo-text">Monecome</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Espace vide pour pousser les éléments à droite -->
      <div class="flex-grow-1"></div>

      <!-- Section droite : Boutons d'action -->
      <div class="d-flex align-items-center gap-2">
        <!-- Menu de navigation - visible seulement en dehors de l'accueil -->
        <ng-container *ngIf="!isHomePage()">
          <a routerLink="/" class="btn btn-outline-light">Accueil</a>
          <a routerLink="/produits" class="btn btn-outline-light">Produits</a>
          <a routerLink="/boutiques" class="btn btn-outline-light">Boutiques</a>
          <a *ngIf="isLoggedIn()" [routerLink]="getDashboardLink()" class="btn btn-outline-light">Dashboard</a>
          <div class="vr text-white-50 mx-1"></div>
        </ng-container>

        <!-- Panier - visible seulement en dehors de l'accueil -->
        <a routerLink="/panier" class="btn btn-outline-light position-relative" *ngIf="!isHomePage()">
          <i class="bi bi-cart"></i>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>

        <!-- Bouton Rafraîchir (toujours visible) -->
        <button class="btn btn-outline-light" (click)="refreshPage()" title="Rafraîchir">
          <i class="bi bi-arrow-repeat"></i>
        </button>

        <!-- Espace utilisateur -->
        <div *ngIf="!isLoggedIn(); else userMenu" class="auth-buttons">
          <a routerLink="/login" class="btn btn-outline-light">Connexion</a>
          <a routerLink="/register" class="btn btn-primary ms-2">Inscription</a>
        </div>

        <!-- Menu utilisateur connecté -->
        <ng-template #userMenu>
          <div class="dropdown">
            <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i>
              <span>{{ getUserName() }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" [routerLink]="getDashboardLink()">
                <i class="bi bi-speedometer2"></i> Tableau de bord
              </a></li>
              <li><a class="dropdown-item" routerLink="/panier">
                <i class="bi bi-cart"></i> Mon panier
              </a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right"></i> Déconnexion
              </a></li>
            </ul>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>
