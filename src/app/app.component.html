<!-- Navbar principale -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/">
      <span class="fs-3">🛍️</span> 
      <span class="ms-2">monecome</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/produits">Produits</a>
        </li>
        <li class="nav-item" *ngIf="!isVendeur()">
          <a class="nav-link" routerLink="/boutiques">Boutiques</a>
        </li>
      </ul>

      <!-- Menu Utilisateur -->
      <div class="d-flex align-items-center gap-3">
        <div *ngIf="isLoggedIn(); else loginBtn" class="user-menu">
          <div class="dropdown">
            <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
              <div class="user-avatar">{{ getUserInitial() }}</div>
              <div class="user-info text-start">
                <span class="user-name">{{ getUserName() }}</span>
                <small class="user-role d-block">{{ getUserRole() }}</small>
              </div>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" [routerLink]="getDashboardLink()">
                <i class="bi bi-speedometer2"></i> Tableau de bord
              </a></li>
              <li><a class="dropdown-item" routerLink="/panier">
                <i class="bi bi-cart"></i> Mon panier
              </a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right"></i> Se déconnecter
              </a></li>
            </ul>
          </div>
        </div>

        <ng-template #loginBtn>
          <a routerLink="/login" class="btn btn-outline-light">Connexion</a>
          <a routerLink="/register" class="btn btn-primary">Inscription</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>
