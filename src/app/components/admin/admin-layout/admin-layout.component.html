<div class="admin-layout">
  <!-- Sidebar gauche -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <a routerLink="/admin" class="logo">
        <span class="logo-icon">🛍️</span>
        <div>
          <span class="logo-text">monecome</span>
          <small>Administration</small>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <a routerLink="/admin/dashboard" class="menu-item" routerLinkActive="active">
          <i class="bi bi-speedometer2"></i>
          <span>Tableau de bord</span>
        </a>
        <a routerLink="/admin/boutiques" class="menu-item" routerLinkActive="active">
          <i class="bi bi-shop"></i>
          <span>Boutiques</span>
        </a>
        <a routerLink="/admin/vendeurs" class="menu-item" routerLinkActive="active">
          <i class="bi bi-people"></i>
          <span>Vendeurs</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Gestion</div>
        <a routerLink="/admin/abonnements" class="menu-item" routerLinkActive="active">
          <i class="bi bi-credit-card"></i>
          <span>Abonnements</span>
        </a>
        <a routerLink="/admin/categories" class="menu-item" routerLinkActive="active">
          <i class="bi bi-tags"></i>
          <span>Catégories</span>
        </a>
        <a routerLink="/admin/commandes" class="menu-item" routerLinkActive="active">
          <i class="bi bi-cart-check"></i>
          <span>Commandes</span>
          <span class="menu-badge">12</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ getUserInitial() }}</div>
        <div class="user-details">
          <div class="user-name">{{ getUserName() }}</div>
          <div class="user-email"><i class="bi bi-envelope"></i> {{ getUserEmail() }}</div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Contenu principal -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>

  <!-- Bouton toggle pour mobile -->
  <button class="sidebar-toggle" (click)="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
</div>
