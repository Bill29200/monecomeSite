<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🛍️</span>
        <span class="logo-text">Admin Panel</span>
      </div>
    </div>

    <!-- Informations administrateur -->
    <div class="admin-info">
      <div class="admin-avatar">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <div class="admin-details">
        <div class="admin-name">{{ getAdminName() }}</div>
        <div class="admin-email">{{ getAdminEmail() }}</div>
        <span class="admin-badge">
          <i class="bi bi-shield-shaded"></i> Administrateur
        </span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" class="nav-item" routerLinkActive="active">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a routerLink="/admin/boutiques" class="nav-item" routerLinkActive="active">
        <i class="bi bi-shop"></i> Boutiques
      </a>
      <a routerLink="/admin/vendeurs" class="nav-item" routerLinkActive="active">
        <i class="bi bi-people"></i> Vendeurs
      </a>
      <a routerLink="/admin/abonnements" class="nav-item" routerLinkActive="active">
        <i class="bi bi-credit-card"></i> Abonnements
      </a>
      <div class="sidebar-footer">
        <button class="btn-logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i> Déconnexion
        </button>
      </div>
    </nav>


  </aside>

  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
