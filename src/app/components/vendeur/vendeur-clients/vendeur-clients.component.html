<div class="vendeur-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2><i class="bi bi-people"></i> Mes clients</h2>
      <p class="text-muted">{{ filteredClients.length }} client(s) au total</p>
    </div>
    <button class="btn btn-primary" (click)="openAddModal()">
      <i class="bi bi-person-plus"></i> Nouveau client
    </button>
  </div>

  <input type="text" class="form-control mb-4" 
         [(ngModel)]="searchTerm" 
         (input)="filterClients()"
         placeholder="🔍 Rechercher un client...">

  <div class="row">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let client of filteredClients">
      <div class="client-card">
        <div class="client-avatar">
          {{ client.nom?.charAt(0) || 'C' }}
        </div>
        <div class="client-info">
          <h5>{{ client.nom }}</h5>
          <p><i class="bi bi-envelope"></i> {{ client.email }}</p>
          <p *ngIf="client.telephone"><i class="bi bi-telephone"></i> {{ client.telephone }}</p>
          <p *ngIf="client.adresse"><i class="bi bi-geo-alt"></i> {{ client.adresse }}</p>
          <div class="client-stats">
            <span class="badge bg-info">{{ client.totalCommandes || 0 }} commandes</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="filteredClients.length === 0" class="empty-state">
    <i class="bi bi-people display-1 text-muted"></i>
    <h4>Aucun client</h4>
    <button class="btn btn-primary" (click)="openAddModal()">Ajouter votre premier client</button>
  </div>
</div>

<!-- Modal Client -->
<div class="modal" [style.display]="showModal ? 'block' : 'none'" style="background: rgba(0,0,0,0.7); position:fixed; top:0; left:0; right:0; bottom:0; z-index:1050;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nouveau client</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nom complet *</label>
          <input type="text" class="form-control" [(ngModel)]="newClient.nom">
        </div>
        <div class="mb-3">
          <label class="form-label">Email *</label>
          <input type="email" class="form-control" [(ngModel)]="newClient.email">
        </div>
        <div class="mb-3">
          <label class="form-label">Téléphone</label>
          <input type="tel" class="form-control" [(ngModel)]="newClient.telephone">
        </div>
        <div class="mb-3">
          <label class="form-label">Adresse</label>
          <textarea class="form-control" rows="2" [(ngModel)]="newClient.adresse"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        <button class="btn btn-primary" (click)="saveClient()" [disabled]="saving">
          {{ saving ? 'Ajout...' : 'Ajouter' }}
        </button>
      </div>
    </div>
  </div>
</div>
