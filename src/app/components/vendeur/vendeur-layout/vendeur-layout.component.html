<div class="vendeur-layout">
  <!-- Sidebar -->
  <aside class="vendeur-sidebar">
    <!-- Header sidebar -->
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🛍️</span>
        <span class="logo-text">monecome</span>
      </div>
    </div>

    <!-- Sélection Boutique -->
    <div class="boutique-selector" *ngIf="boutiques.length > 0">
      <label><i class="bi bi-shop"></i> Boutique active</label>
      <select class="form-select" (change)="selectBoutique(boutiques[$any($event.target).value])">
        <option *ngFor="let b of boutiques; let i = index" [value]="i" [selected]="boutiqueSelectionnee?.id === b.id">
          {{ b.nom }}
        </option>
      </select>
    </div>

    <div class="boutique-selector" *ngIf="boutiques.length === 0">
      <div class="no-shop-warning">
        <i class="bi bi-exclamation-triangle"></i> Aucune boutique
      </div>
    </div>

    <!-- Menu Navigation -->
    <nav class="sidebar-nav">
      <a routerLink="/vendeur/dashboard" class="nav-item" routerLinkActive="active">
        <i class="bi bi-speedometer2"></i>
        <span>Tableau de bord</span>
      </a>
      <a routerLink="/vendeur/boutiques" class="nav-item" routerLinkActive="active">
        <i class="bi bi-shop"></i>
        <span>Mes boutiques</span>
      </a>
      <a routerLink="/vendeur/produits" class="nav-item" routerLinkActive="active">
        <i class="bi bi-box-seam"></i>
        <span>Produits</span>
      </a>
      <a routerLink="/vendeur/clients" class="nav-item" routerLinkActive="active">
        <i class="bi bi-people"></i>
        <span>Clients</span>
      </a>
      <a routerLink="/vendeur/commandes" class="nav-item" routerLinkActive="active">
        <i class="bi bi-cart-check"></i>
        <span>Commandes</span>
      </a>
    </nav>

    <!-- Footer simple sans déconnexion -->
    <div class="sidebar-footer">
      <div class="vendeur-info">
        <div class="avatar">{{ getInitial() }}</div>
        <div class="vendeur-details">
          <div class="vendeur-name">{{ vendeurNom }}</div>
          <div class="vendeur-email">{{ vendeurEmail }}</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Contenu principal -->
  <main class="vendeur-main">
    <router-outlet></router-outlet>
  </main>
</div>
