<div class="vendeur-layout">
  <aside class="vendeur-sidebar">
    <div class="sidebar-header">
      <div class="logo">🛍️ Vendeur</div>
    </div>

    <div class="boutique-selector" *ngIf="boutiques.length > 0">
      <label>Boutique active</label>
      <select (change)="selectBoutique(boutiques[$any($event.target).value])">
        <option *ngFor="let b of boutiques; let i = index" [value]="i" [selected]="boutiqueSelectionnee?.id === b.id">
          {{ b.nom }}
        </option>
      </select>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/vendeur/dashboard" class="nav-item" routerLinkActive="active">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a routerLink="/vendeur/boutiques" class="nav-item" routerLinkActive="active">
        <i class="bi bi-shop"></i> Mes boutiques
      </a>
      <a routerLink="/vendeur/produits" class="nav-item" routerLinkActive="active">
        <i class="bi bi-box-seam"></i> Produits
      </a>
      <a routerLink="/vendeur/clients" class="nav-item" routerLinkActive="active">
        <i class="bi bi-people"></i> Clients
      </a>
      <a routerLink="/vendeur/commandes" class="nav-item" routerLinkActive="active">
        <i class="bi bi-cart-check"></i> Commandes
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="vendeur-info">
        <div class="avatar">{{ getInitial() }}</div>
        <div class="vendeur-details">
          <div class="vendeur-name">{{ vendeurNom }}</div>
          <div class="vendeur-email">{{ vendeurEmail }}</div>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </button>
    </div>
  </aside>

  <main class="vendeur-main">
    <router-outlet></router-outlet>
  </main>
</div>
