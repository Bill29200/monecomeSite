<div class="vendeur-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2><i class="bi bi-shop"></i> Mes boutiques</h2>
      <p class="text-muted">{{ boutiques.length }} boutique(s)</p>
    </div>
    <button class="btn btn-primary" (click)="openCreateModal()">
      <i class="bi bi-plus-lg"></i> Nouvelle boutique
    </button>
  </div>

  <div class="row">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let boutique of boutiques">
      <div class="boutique-card">
        <div class="boutique-header">
          <div class="boutique-icon">🛍️</div>
          <div class="boutique-status">
            <span class="badge" [class.bg-success]="boutique.statut === 'active'" 
                  [class.bg-secondary]="boutique.statut !== 'active'">
              {{ boutique.statut }}
            </span>
            <span class="badge bg-info ms-1">{{ boutique.abonnement }}</span>
          </div>
        </div>
        <div class="boutique-body">
          <h4>{{ boutique.nom }}</h4>
          <p class="text-muted small">{{ boutique.description || 'Aucune description' }}</p>
          <p *ngIf="boutique.adresse"><i class="bi bi-geo-alt"></i> {{ boutique.adresse }}</p>
          <p *ngIf="boutique.telephone"><i class="bi bi-telephone"></i> {{ boutique.telephone }}</p>
          <div class="boutique-actions mt-3">
            <button class="btn btn-sm btn-outline-primary me-2" (click)="openEditModal(boutique)">
              <i class="bi bi-pencil"></i> Modifier
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteBoutique(boutique)">
              <i class="bi bi-trash"></i> Supprimer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="boutiques.length === 0" class="empty-state">
    <i class="bi bi-shop display-1 text-muted"></i>
    <h4>Aucune boutique</h4>
    <button class="btn btn-primary" (click)="openCreateModal()">Créer votre première boutique</button>
  </div>
</div>

<div class="modal" [style.display]="showModal ? 'block' : 'none'" style="background: rgba(0,0,0,0.7); position:fixed; top:0; left:0; right:0; bottom:0; z-index:1050;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ editingBoutique ? 'Modifier' : 'Nouvelle' }} boutique</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nom de la boutique *</label>
          <input type="text" class="form-control" [(ngModel)]="formBoutique.nom">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="3" [(ngModel)]="formBoutique.description"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Adresse</label>
          <input type="text" class="form-control" [(ngModel)]="formBoutique.adresse">
        </div>
        <div class="mb-3">
          <label class="form-label">Téléphone</label>
          <input type="tel" class="form-control" [(ngModel)]="formBoutique.telephone">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        <button class="btn btn-primary" (click)="saveBoutique()" [disabled]="saving">
          {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </div>
  </div>
</div>
