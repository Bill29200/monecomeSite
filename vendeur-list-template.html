<!-- Template mis à jour pour la liste des vendeurs -->
<div class="admin-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Vendeurs</h2>
      <p class="text-muted">{{ filteredVendeurs.length }} vendeur(s) enregistré(s)</p>
    </div>
    <button class="btn btn-primary" (click)="openAddModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Ajouter un vendeur
    </button>
  </div>

  <input type="text" class="form-control mb-4" 
         [(ngModel)]="searchTerm" 
         (input)="filterVendeurs()"
         placeholder="Rechercher un vendeur...">

  <div class="vendeur-card" *ngFor="let vendeur of filteredVendeurs">
    <div class="d-flex align-items-center gap-3">
      <div class="avatar" [style.background]="getAvatarColor(vendeur.nom)">
        {{ vendeur.nom?.charAt(0) || 'V' }}
      </div>
      <div class="flex-grow-1">
        <h5>{{ vendeur.nom }}</h5>
        <p class="text-muted mb-1">{{ vendeur.email }}</p>
      </div>
      <button class="btn-delete" (click)="openDeleteVendeurModal(vendeur)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 7L18.1327 19.1425C18.0579 20.1891 17.187 21 16.1378 21H7.86224C6.81296 21 5.94208 20.1891 5.86732 19.1425L5 7M10 11V16M14 11V16M15 4H9M18 7H6"/>
        </svg>
        Supprimer
      </button>
    </div>
  </div>
</div>

<!-- Inclusion de la modale -->
<app-vendeur-delete-modal
  *ngIf="showDeleteVendeurModal"
  [vendeur]="vendeurToDelete"
  [isDeleting]="isDeleting"
  (onConfirm)="confirmVendeurDelete()"
  (onCancel)="closeDeleteModal()">
</app-vendeur-delete-modal>
