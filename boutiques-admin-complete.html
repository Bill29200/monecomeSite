<div class="admin-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Boutiques</h2>
      <p class="text-muted">{{ filteredBoutiques.length }} boutique(s) au total</p>
    </div>
    <!-- BOUTON NOUVELLE BOUTIQUE - Vérifiez que (click) appelle openNewBoutiqueModal() -->
    <button class="btn btn-primary" (click)="openNewBoutiqueModal()" style="display: inline-flex; align-items: center; gap: 8px;">
      <span style="font-size: 18px;">➕</span>
      Nouvelle boutique
    </button>
  </div>

  <input type="text" class="form-control mb-4" 
         [(ngModel)]="searchTerm" 
         (input)="filterBoutiques()"
         placeholder="🔍 Rechercher une boutique...">

  <!-- Liste des boutiques -->
  <div class="boutique-card" *ngFor="let b of filteredBoutiques">
    <div class="d-flex align-items-center gap-3">
      <div class="boutique-icon">🛍️</div>
      <div class="flex-grow-1">
        <h5>{{ b.nom }}</h5>
        <p class="text-muted mb-1">{{ b.vendeurEmail || b.vendeurNom }}</p>
        <span class="badge" [ngClass]="{'bg-success': b.statut === 'active', 'bg-secondary': b.statut !== 'active'}">
          {{ b.statut }}
        </span>
        <span class="badge bg-info ms-2">{{ b.abonnement }}</span>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-primary me-2" (click)="editBoutique(b)">
          ✏️ Modifier
        </button>
        <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(b)">
          🗑️ Supprimer
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL Nouvelle / Modifier Boutique -->
<div class="modal-custom" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-custom-dialog" (click)="$event.stopPropagation()">
    <div class="modal-custom-header">
      <h3>{{ editingBoutique ? '✏️ Modifier la boutique' : '➕ Nouvelle boutique' }}</h3>
      <button class="modal-custom-close" (click)="closeModal()">&times;</button>
    </div>
    <div class="modal-custom-body">
      <div class="form-group">
        <label>Nom de la boutique *</label>
        <input type="text" class="form-control" [(ngModel)]="newBoutique.nom" placeholder="Ex: Boutique Mode">
      </div>
      <div class="form-group">
        <label>Vendeur *</label>
        <select class="form-control" [(ngModel)]="newBoutique.vendeurId" (change)="onVendeurSelected()">
          <option value="">Sélectionner un vendeur</option>
          <option *ngFor="let v of vendeurs" [value]="v.id">
            {{ v.nom }} ({{ v.email }})
          </option>
        </select>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Statut</label>
            <select class="form-control" [(ngModel)]="newBoutique.statut">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="suspendue">Suspendue</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Abonnement</label>
            <select class="form-control" [(ngModel)]="newBoutique.abonnement">
              <option value="gratuit">Gratuit</option>
              <option value="basic">Basic</option>
              <option value="premium">Premium</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" rows="2" [(ngModel)]="newBoutique.description" placeholder="Description de la boutique..."></textarea>
      </div>
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" class="form-control" [(ngModel)]="newBoutique.adresse" placeholder="Adresse">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" class="form-control" [(ngModel)]="newBoutique.telephone" placeholder="Téléphone">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-custom-footer">
      <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
      <button class="btn btn-primary" (click)="saveBoutique()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Enregistrement...' : (editingBoutique ? 'Mettre à jour' : 'Créer') }}
      </button>
    </div>
  </div>
</div>

<!-- Styles CSS -->
<style>
  .modal-custom {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .modal-custom-dialog {
    background: white;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideIn 0.3s ease;
  }
  .modal-custom-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid #e5e7eb;
  }
  .modal-custom-header h3 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  .modal-custom-close {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #9ca3af;
  }
  .modal-custom-body {
    padding: 24px;
  }
  .modal-custom-footer {
    padding: 16px 24px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    font-size: 14px;
  }
  .form-control {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
  }
  .form-control:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
  }
  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 500;
    cursor: pointer;
    border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }
  .btn-secondary {
    background: #f3f4f6;
    color: #374151;
  }
  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .bg-success { background: #10b981; color: white; }
  .bg-secondary { background: #6b7280; color: white; }
  .bg-info { background: #3b82f6; color: white; }
  .boutique-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: all 0.2s;
  }
  .boutique-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .boutique-icon {
    font-size: 2rem;
    width: 55px;
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    border-radius: 12px;
  }
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
